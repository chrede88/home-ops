---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: 'Labeler'

on:
  workflow_dispatch:
  pull_request:
    branches: ['main']

permissions:
  contents: read
  pull-requests: write

jobs:
  labeler:
    name: Labeler
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - name: Labeler
        uses: actions/labeler@bf12e9b00b37c5c0ca2b87b79b2daf7891dbda13 # v7.0.0
        with:
          configuration-path: .github/labeler.yaml
