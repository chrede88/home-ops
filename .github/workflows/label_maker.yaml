---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: 'Labeler'

on:
  workflow_dispatch:
  pull_request:
    branches: ['main']

permissions:
  contents: read
  pull-requests: write

jobs:
  labeler:
    name: Labeler
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - name: Labeler
        uses: actions/labeler@b8dd2d9be0f68b860e7dae5dae7d772984eacd6d # v6.2.0
        with:
          configuration-path: .github/labeler.yaml
