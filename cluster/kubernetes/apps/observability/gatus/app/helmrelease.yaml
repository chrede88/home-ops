---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus
spec:
  interval: 30m
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: gatus-sidecar
    namespace: flux-system
  values:
    fullnameOverride: gatus
    deploymentAnnotations:
      reloader.stakater.com/auto: "true"
    gatus:
      configPath: /config
      port: 8080
      logLevel: INFO
      delayStartSeconds: 5
      envFrom:
        - secretRef:
            name: gatus-secret
    sidecar:
      enabled: true
      logLevel: info
      kinds:
        ingress:
          enable: false
        httproute:
          enable: true
          auto: false
        service:
          enable: false
        ingressroute:
          enable: false
    config:
      existingConfigMap: gatus-configmap
      items:
        - key: config.yaml
          path: config.yaml
    serviceAccount:
      create: true
    rbac:
      create: true
      type: ClusterRole
      extraRules:
        - apiGroups:
            - gateway.networking.k8s.io
          resources:
            - gateways
            - httproutes
          verbs:
            - get
            - list
            - watch
    persistence:
      enabled: false
    resources:
      limits:
        cpu: 250m
        memory: 100Mi
      requests:
        cpu: 50m
        memory: 50Mi
    service:
      type: ClusterIP
      port: 8080
    monitoring:
      serviceMonitor:
        enabled: true