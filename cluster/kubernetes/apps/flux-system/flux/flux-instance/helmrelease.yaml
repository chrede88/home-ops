---
# yaml-language-server: $schema=https://k8s-schemas-cjso.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-instance
spec:
  interval: 30m
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: flux-instance
    namespace: flux-system
  values:
    instance:
      distribution:
        artifact: oci://ghcr.io/controlplaneio-fluxcd/flux-operator-manifests:v0.44.0
        version: 2.x
      cluster:
        type: kubernetes
        multitenant: false
        networkPolicy: true
        domain: cluster.local
      components:
        - source-controller
        - kustomize-controller
        - helm-controller
        - notification-controller
      sync:
        kind: GitRepository
        provider: github
        url: https://github.com/chrede88/home-ops.git
        ref: refs/heads/main
        path: cluster/kubernetes/flux/main
        pullSecret: github-auth
      kustomize:
        patches:
          # Controller level SOPS/age decryption
          - patch: |
              - op: add
                path: /spec/template/spec/containers/0/args/-
                value: --sops-age-secret=sops-age
            target:
              kind: Deployment
              name: kustomize-controller
          # Cancel health checks on new Kustomizations revisions
          - patch: |
              - op: add
                path: /spec/template/spec/containers/0/args/-
                value: --feature-gates=CancelHealthCheckOnNewRevision=true
            target:
              kind: Deployment
              name: kustomize-controller
          # Add label to namespace
          - patch: |
              - op: add
                path: /metadata/labels/internal-gateway-access
                value: "true"
            target:
              kind: Namespace
              name: flux-system
          # Set memory limit for flux controllers
          - patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: all
              spec:
                template:
                  spec:
                    containers:
                      - name: manager
                        resources:
                          limits:
                            memory: 384Mi
            target:
              kind: Deployment
              name: (kustomize-controller|helm-controller|source-controller|notification-controller)