---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: flux-operator
  namespace: flux-system
spec:
  allowCrossNamespaceImport: true
  folderRef: flux-folder
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasources:
  - datasourceName: prometheus
    inputName: DS_PROMETHEUS
  url:
    https://raw.githubusercontent.com/controlplaneio-fluxcd/flux-operator/refs/heads/main/config/monitoring/dashboards/flux-performance.json
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: flux
  namespace: flux-system
spec:
  allowCrossNamespaceImport: true
  folderRef: flux-folder
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasources:
  - datasourceName: prometheus
    inputName: DS_PROMETHEUS
  url:
    https://raw.githubusercontent.com/controlplaneio-fluxcd/flux-operator/refs/heads/main/config/monitoring/dashboards/flux-k8s-api-performance.json
