---
# yaml-language-server: $schema=https://k8s-schemas-cjso.pages.dev/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: spegel-dashboard
  namespace: kube-system
spec:
  allowCrossNamespaceImport: true
  folder: General
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasources:
    - datasourceName: prometheus
      inputName: datasource
  configMapRef:
    name: spegel-dashboard
    key: spegel.json