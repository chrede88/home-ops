---
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: chrede88
  namespace: renovate
spec:
  discoverTopics:
    - renovate
  extraEnv:
    - name: LOG_LEVEL
      value: debug
    - name: RENOVATE_PLATFORM_COMMIT
      value: 'enabled'
    - name: RENOVATE_BOT_NAME
      value: 'bb-17'
    - name: RENOVATE_REDIS_URL
      value: redis://dragonfly-renovate.database.svc.cluster.local:6379
    - name: GITHUB_PAT
      valueFrom:
        secretKeyRef:
          name: github-pull-token
          key: GITHUB_PAT
    - name: RENOVATE_HOST_RULES
      value: >-
          [{"hostType": "docker", "matchHost": "ghcr.io", "username": "chrede88", "password": "$(GITHUB_PAT)"}]
  image: ghcr.io/renovatebot/renovate:43.159.1
  parallelism: 3
  provider:
    name: github
    endpoint: https://api.github.com
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  schedule: 0 * * * *
  secretRef: renovate-secret
  skipForks: true
  webhook:
    enabled: true
    authentication:
      enabled: false