---
## yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kromgo
spec:
  interval: 30m
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: kromgo
    namespace: flux-system
  values:
    replicaCount: 1
    existingConfigMap: kromgo-configmap
    serviceAccount:
      create: false
    httpRoute:
      enabled: false
    monitoring:
      serviceMonitor:
        enabled: true