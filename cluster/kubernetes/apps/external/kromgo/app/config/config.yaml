---
# yaml-language-server: $schema=https://raw.githubusercontent.com/home-operations/kromgo/refs/heads/main/config.schema.json

gallery:
    enabled: true

defaults:
    badge:
        font: dejavu-sans
        size: 11
        style: flat
        gallery:
            hidden: false

badges:
  - id: talos_version
    query: node_os_info{name="Talos"}
    valueExpr: labels["version_id"]
    colorExpr: '"#cba6f7"'
    title: Talos
    icon: si:talos

  - id: kubernetes_version
    query: kubernetes_build_info{service="kubernetes"}
    valueExpr: labels["git_version"]
    colorExpr: '"#cba6f7"'
    title: Kubernetes
    icon: si:kubernetes

  - id: flux_version
    query: label_replace(flux_instance_info, "revision", "$1", "revision", "(.+)@sha256:.+")
    valueExpr: labels["revision"]
    colorExpr: '"#cba6f7"'
    title: Flux
    icon: si:flux

  - id: cluster_node_count
    query: count(count by (node) (kube_node_status_condition{condition="Ready"}))
    colorExpr: '"#cba6f7"'
    title: Nodes

  - id: cluster_pod_count
    query: sum(kube_pod_status_phase{phase="Running"})
    colorExpr: '"#cba6f7"'
    title: Pods

  - id: cluster_cpu_usage
    query: round(avg(instance:node_cpu_utilisation:rate5m) * 100, 0.1)
    valueExpr: string(result) + "%"
    colorExpr: 'colorScale(result, [20.9, 75.9], ["green", "orange", "red"])'
    title: CPU

  - id: cluster_memory_usage
    query: round(avg(instance:node_memory_utilisation:ratio) * 100, 0.1)
    valueExpr: string(result) + "%"
    colorExpr: 'colorScale(result, [20.9, 75.9], ["green", "orange", "red"])'
    title: Memory

  - id: cluster_memory_usage_bytes
    query: avg(node_memory_MemTotal_bytes)-avg(node_memory_MemAvailable_bytes)
    valueExpr: humanizeBytes(result)
    colorExpr: '"#cba6f7"'
    title: Memory

  - id: cluster_uptime_days
    query: round(node_time_seconds - node_boot_time_seconds)
    valueExpr: humanizeDurationDays(result)
    colorExpr: '"#cba6f7"'
    title: Up Time

  - id: cluster_age_days
    query: round(time() - min(kube_node_created))
    valueExpr: humanizeDurationDays(result)
    colorExpr: '"#cba6f7"'
    title: Age

  - id: ceph_health_status
    query: ceph_health_status
    valueExpr: 'result == 0.0 ? "Healthy" : result == 1.0 ? "Warning" : "Critical"'
    colorExpr: 'result == 0.0 ? "green" : result == 1.0 ? "orange" : "red"'
    title: Ceph

  - id: cluster_alert_count
    query: alertmanager_alerts{state="active"} - 1 # Ignore Watchdog
    colorExpr: 'colorScale(result, [1.0, 5.0], ["green", "orange", "red"])'
    title: Alerts