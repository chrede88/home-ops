---
# yaml-language-server: $schema=https://k8s-schemas-cjso.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name crd-schema-publisher
spec:
  interval: 30m
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: crd-schema-publisher
    namespace: flux-system
  values:
    mode: controller
    config:
      cfPagesProject: k8s-schemas-cjso
      existingSecret:
        name: cloudflare-pages
      externalSecret:
        enabled: false
      metrics:
        podMonitor:
          enabled: true
        prometheusRule:
          enabled: true