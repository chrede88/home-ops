---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name external-dns-internal
spec:
  interval: 30m
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: external-dns
    namespace: flux-system
  values:
    fullnameOverride: *name
    logLevel: &logLevel debug
    deploymentAnnotations:
      reloader.stakater.com/auto: "true"
    serviceMonitor:
      enabled: true
    rbac:
      create: true
      additionalPermissions:
        - apiGroups: ['']
          resources: ['namespaces']
          verbs: ['get', 'watch', 'list']
        - apiGroups: ['gateway.networking.k8s.io']
          resources: ['gateways', 'httproutes']
          verbs: ['get', 'watch', 'list']
    sources:
      - gateway-httproute
    policy: sync
    triggerLoopOnEvent: true
    txtOwnerId: main
    txtPrefix: k8s.main.%{record_type}-
    domainFilters:
      - cjsolsen.com
    env:
      - name: EXTERNAL_DNS_GATEWAY_LABEL_FILTER
        value: gateway-label==internal-gateway
      - name: EXTERNAL_DNS_LABEL_FILTER
        value: route-label==external-dns-internal
    provider:
      name: webhook
      webhook:
        image:
          repository: ghcr.io/home-operations/external-dns-unifi-webhook
          tag: 0.10.4
        env:
          - name: UNIFI_HOST
            value: https://10.10.0.252
          - name: UNIFI_API_KEY
            valueFrom:
              secretKeyRef:
                name: external-dns-unifi-secret
                key: api-key
          - name: UNIFI_SKIP_TLS_VERIFY
            value: "true"
          - name: LOG_LEVEL
            value: *logLevel
        livenessProbe:
          httpGet:
            path: /healthz
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /readyz
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5