---
# yaml-language-server: $schema=https://k8s-schemas-cjso.pages.dev/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: envoy-overview
  namespace: network
spec:
  allowCrossNamespaceImport: true
  folderRef: envoy-folder
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasources:
  - datasourceName: prometheus
    inputName: DS_PROMETHEUS
  url: https://grafana.com/api/dashboards/24459/revisions/3/download
